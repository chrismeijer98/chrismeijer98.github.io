<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Portal — House of Pilots</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav no-print">
  <div class="nav-brand">
    <a href="index.html" class="btn-ghost" style="padding:6px;display:flex;align-items:center" title="Terug naar home">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </a>
    <div class="nav-logo">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#E56B3E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transform:rotate(-20deg)"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
    </div>
    <div>
      <div class="nav-title">House of Pilots Portal</div>
      <div class="nav-sub" id="nav-user">Pilot Career Plan</div>
    </div>
  </div>
  <div class="nav-right">
    <button class="role-btn" id="role-pilot" data-role="pilot">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Piloot
    </button>
    <button class="role-btn" id="role-coach" data-role="coach">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 11a5 5 0 1 0-10 0v6h10z"/><path d="M12 2v3"/><path d="m4.9 4.9 2.1 2.1"/><path d="m19.1 4.9-2.1 2.1"/><path d="M3 21h18"/></svg>
      Coach
    </button>
    <button class="role-btn" id="btn-logout" title="Uitloggen" style="background:transparent">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</nav>

<div class="app-grid">
  <aside class="sidebar no-print">
    <div class="sidebar-label">Navigatie</div>
    <button class="side-link" data-tab="dashboard">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
      Dashboard
    </button>
    <button class="side-link" data-tab="pcp">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
      PCP — Competenties
    </button>
    <button class="side-link" data-tab="feedback">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      360° Feedback
    </button>

    <div style="margin-top:32px;padding:0 12px">
      <div class="sidebar-label" style="padding:0 0 10px">Huidige rol</div>
      <div id="role-card" style="padding:14px;border-radius:10px;border:1px solid"></div>
    </div>
  </aside>

  <main class="main" id="main"></main>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/data.js"></script>
<script src="js/utils.js"></script>
<script src="js/portal.js"></script>
</body>
</html>
