<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>House of Pilots — Pilot Career Portal</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-wrap{
      min-height:100vh;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:32px 16px;background:var(--cream);
    }
    .login-logo{display:flex;align-items:center;gap:12px;margin-bottom:40px}
    .login-logo-mark{width:44px;height:44px;border-radius:10px;background:var(--navy-deep);display:flex;align-items:center;justify-content:center}
    .login-brand{font-family:'Fraunces',Georgia,serif;font-size:20px;font-weight:700;color:var(--navy-deep);line-height:1}
    .login-brand-sub{font-size:10px;letter-spacing:.25em;color:var(--muted);text-transform:uppercase;margin-top:3px;font-weight:500}
    .login-card{width:100%;max-width:420px;background:white;border:1px solid var(--sand);border-radius:16px;padding:36px}
    .login-title{font-family:'Fraunces',Georgia,serif;font-size:26px;font-weight:600;color:var(--navy-deep);margin-bottom:6px}
    .login-sub{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.5}
    .err-msg{font-size:13px;color:var(--danger);margin-top:10px;display:none;padding:10px 12px;background:rgba(185,28,28,.07);border-radius:8px}
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-logo fade-up">
    <div class="login-logo-mark">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#E56B3E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transform:rotate(-20deg)">
        <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
      </svg>
    </div>
    <div>
      <div class="login-brand">House of Pilots</div>
      <div class="login-brand-sub">Pilot Career Portal</div>
    </div>
  </div>

  <div class="login-card fade-up" style="animation-delay:.1s">
    <div class="login-title">Inloggen</div>
    <div class="login-sub">Voer je naam en wachtwoord in om door te gaan.</div>

    <form id="enter-form">
      <div class="field">
        <label class="field-label">Naam</label>
        <input id="f-name" class="input" placeholder="bv. Storm Tromp" autocomplete="username" required>
      </div>
      <div class="field">
        <label class="field-label">Wachtwoord</label>
        <input id="f-pass" class="input" type="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <p class="err-msg" id="login-err">Naam of wachtwoord onjuist.</p>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:8px">
        Open mijn portal
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </button>
    </form>

    <div style="margin-top:20px;text-align:center;font-size:12px;color:var(--muted);line-height:1.9">
      Feedback-code ontvangen? <a href="feedback.html" style="color:var(--coral-dark);font-weight:600">Klik hier</a><br>
      <a href="admin.html" style="color:var(--muted)">Beheerder →</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
  document.getElementById('enter-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('f-name').value.trim();
    const pass = document.getElementById('f-pass').value;
    const err  = document.getElementById('login-err');
    err.style.display = 'none';
    if (!name || !pass) return;

    const btn  = e.target.querySelector('button[type=submit]');
    const orig = btn.innerHTML;
    btn.disabled = true; btn.textContent = 'Even geduld…';

    try {
      const user = await HopApi.loginUser({ full_name: name, password: pass });
      HopSession.set({ user_id: user.id, full_name: user.full_name, role: user.role });
      window.location.href = 'portal.html';
    } catch (ex) {
      err.style.display = 'block';
      btn.disabled = false; btn.innerHTML = orig;
    }
  });
</script>
</body>
</html>
